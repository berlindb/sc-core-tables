name: Regenerate schemas

# Polls Sugar Calendar's latest release, regenerates the schema classes from it, and
# opens a PR if anything changed - so this repo tracks SC automatically.

on:
  schedule:
    - cron: '23 6 * * *'   # daily
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Checkout berlindb/core
        uses: actions/checkout@v6
        with:
          repository: berlindb/core
          ref: master
          path: berlindb-core

      - name: Setup PHP + WP-CLI
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli
          tools: composer, wp-cli
          coverage: none

      - name: Install dependencies
        run: |
          composer config repositories.berlindb-core path ./berlindb-core
          composer update --no-interaction --prefer-dist --no-progress

      - name: Use mysql_native_password auth
        run: mysql -h 127.0.0.1 -P 3306 -u root -proot --ssl-mode=DISABLED --get-server-public-key -e "ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY 'root';"

      - name: Set up a throwaway WordPress
        run: |
          wp core download --path=wp --version=latest
          wp config create --path=wp --dbname=wordpress --dbuser=root --dbpass=root --dbhost=127.0.0.1:3306
          wp core install --path=wp --url=http://localhost --title=scct --admin_user=admin --admin_password=admin --admin_email=a@b.c --skip-email

      - name: Install + activate latest Sugar Calendar (Lite)
        run: |
          wp --path=wp plugin install sugar-calendar-lite --activate
          echo "SC_VERSION=$(wp --path=wp plugin get sugar-calendar-lite --field=version)" >> "$GITHUB_ENV"

      - name: Regenerate schemas from the live SC install
        run: wp --path=wp eval-file bin/generate-schemas.php

      - name: Open a PR if the schemas changed
        uses: peter-evans/create-pull-request@v7
        with:
          branch: regenerate/sc-${{ env.SC_VERSION }}
          title: "Regenerate schemas for Sugar Calendar ${{ env.SC_VERSION }}"
          commit-message: "Regenerate schemas from Sugar Calendar ${{ env.SC_VERSION }}"
          body: |
            Automated regeneration from the latest Sugar Calendar release
            (**${{ env.SC_VERSION }}**). Review the schema diff, then let CI's capability
            test confirm whether core can still express them.
          add-paths: src/Schemas/
          delete-branch: true
